<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Not Today - Ropa Alternativa{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Orbitron:wght@500&family=Montserrat&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to right, #0f0f0f, #2e003e);
            font-family: 'Montserrat', sans-serif;
            color: #f0f0f0;
        }

        header {
            background-color: #1c1c1c;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff4dc4;
        }

        header h1 {
            font-family: 'UnifrakturCook', cursive;
            font-size: 3em;
            color: #ff4dc4;
            margin: 0;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 15px;
            background-color: #2a2a2a;
            padding: 10px;
        }

        nav a {
            color: #ffffff;
            text-decoration: none;
            padding: 10px 15px;
            border-radius: 5px;
            background-color: #6200ea;
            transition: 0.3s ease;
        }

        nav a:hover {
            background-color: #ff4dc4;
        }

        main {
            padding: 30px;
        }

        footer {
            text-align: center;
            padding: 15px;
            background-color: #1c1c1c;
            border-top: 3px solid #ff4dc4;
            margin-top: 40px;
        }

        .geek-icon {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2em;
            color: #00ffc3;
        }
    </style>
</head>
<body>
    <header>
        <h1>🖤 Not Today 🖤</h1>
        <p>Moda Gótica x K-pop x Cultura Geek</p>
    </header>

    <nav>
        <a href="{% url 'inicio' %}">Inicio</a>
        <a href="{% url 'crear_cliente' %}">Clientes</a>
        <a href="{% url 'crear_empleado' %}">Empleados</a>
        <a href="{% url 'crear_prenda' %}">Prendas</a>
        <a href="{% url 'buscar_prenda' %}">Buscar Prenda</a>
    </nav>

    <main>
        {% block contenido %}{% endblock %}
    </main>

    <footer>
        <p class="geek-icon">👾 &copy; 2025 - Not Today | Estilo Alternativo con Actitud</p>
    </footer>
</body>
</html>
